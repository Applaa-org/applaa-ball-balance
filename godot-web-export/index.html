<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="hud" class="hidden">
            <div class="hud-item" id="timeDisplay">Time: 0.0s</div>
            <div class="hud-item hud-best" id="hudHighScore">Best: 0.0s</div>
        </div>
        
        <div id="startScreen">
            <h1>🎱 Ball Balance</h1>
            <p class="subtitle">Keep the ball on the platform!</p>
            <p class="instructions">
                Use ← → Arrow Keys or A/D to tilt the platform<br>
                Don't let the ball fall off!
            </p>
            <div class="high-score-display" id="highScoreDisplay">High Score: 0.0s</div>
            <div class="leaderboard" id="leaderboard"></div>
            <div class="input-group">
                <label for="playerName">Enter Your Name</label>
                <input type="text" id="playerName" placeholder="Player" maxlength="20">
            </div>
            <button id="startBtn">Start Game</button>
            <button class="btn-close" id="closeBtn">Close</button>
        </div>
        
        <div id="gameOverScreen" class="hidden">
            <h2 class="game-over-title">Game Over!</h2>
            <p class="final-score" id="finalScore">Time Survived: 0.0s</p>
            <p class="high-score-display" id="gameOverHighScore">High Score: 0.0s</p>
            <p class="new-high-score hidden" id="newHighScore">🎉 New High Score!</p>
            <button id="restartBtn">Try Again</button>
            <button class="btn-secondary" id="menuBtn">Main Menu</button>
            <button class="btn-close" id="closeBtn2">Close</button>
        </div>
        
        <div id="mobileControls">
            <div class="mobile-btn" id="leftBtn">◀</div>
            <div class="mobile-btn" id="rightBtn">▶</div>
        </div>
    </div>
    
    <script>
        // Game Constants
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 600;
        const GRAVITY = 980;
        const PLATFORM_WIDTH = 300;
        const PLATFORM_HEIGHT = 20;
        const BALL_RADIUS = 20;
        const MAX_TILT_ANGLE = 0.5;
        const TILT_SPEED = 2.0;
        const FRICTION = 0.98;
        const BOUNCE = 0.2;
        
        // Game State
        let gameState = 'start';
        let score = 0;
        let highScore = 0;
        let lastPlayerName = '';
        let scores = [];
        let gameId = 'ball-balance';
        
        // Physics Objects
        let ball = {
            x: CANVAS_WIDTH / 2,
            y: 350,
            vx: 0,
            vy: 0,
            radius: BALL_RADIUS,
            rotation: 0
        };
        
        let platform = {
            x: CANVAS_WIDTH / 2,
            y: 400,
            width: PLATFORM_WIDTH,
            height: PLATFORM_HEIGHT,
            angle: 0,
            targetAngle: 0
        };
        
        // Input State
        let keys = {
            left: false,
            right: false
        };
        
        // Canvas and Context
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // UI Elements
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const hud = document.getElementById('hud');
        const timeDisplay = document.getElementById('timeDisplay');
        const hudHighScore = document.getElementById('hudHighScore');
        const highScoreDisplay = document.getElementById('highScoreDisplay');
        const gameOverHighScore = document.getElementById('gameOverHighScore');
        const finalScoreEl = document.getElementById('finalScore');
        const newHighScoreEl = document.getElementById('newHighScore');
        const playerNameInput = document.getElementById('playerName');
        const leaderboardEl = document.getElementById('leaderboard');
        
        // Timing
        let lastTime = 0;
        let animationId = null;
        
        // Initialize
        function init() {
            setupEventListeners();
            loadGameData();
            updateHighScoreDisplays();
            draw();
        }
        
        function setupEventListeners() {
            // Keyboard
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                    keys.left = true;
                    e.preventDefault();
                }
                if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                    keys.right = true;
                    e.preventDefault();
                }
            });
            
            document.addEventListener('keyup', (e) => {
                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                    keys.left = false;
                }
                if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                    keys.right = false;
                }
            });
            
            // Mobile Controls
            const leftBtn = document.getElementById('leftBtn');
            const rightBtn = document.getElementById('rightBtn');
            
            leftBtn.addEventListener('touchstart', (e) => { keys.left = true; e.preventDefault(); });
            leftBtn.addEventListener('touchend', () => { keys.left = false; });
            leftBtn.addEventListener('mousedown', () => { keys.left = true; });
            leftBtn.addEventListener('mouseup', () => { keys.left = false; });
            leftBtn.addEventListener('mouseleave', () => { keys.left = false; });
            
            rightBtn.addEventListener('touchstart', (e) => { keys.right = true; e.preventDefault(); });
            rightBtn.addEventListener('touchend', () => { keys.right = false; });
            rightBtn.addEventListener('mousedown', () => { keys.right = true; });
            rightBtn.addEventListener('mouseup', () => { keys.right = false; });
            rightBtn.addEventListener('mouseleave', () => { keys.right = false; });
            
            // Buttons
            document.getElementById('startBtn').addEventListener('click', startGame);
            document.getElementById('restartBtn').addEventListener('click', restartGame);
            document.getElementById('menuBtn').addEventListener('click', showMenu);
            document.getElementById('closeBtn').addEventListener('click', closeGame);
            document.getElementById('closeBtn2').addEventListener('click', closeGame);
            
            // Listen for data from parent
            window.addEventListener('message', handleMessage);
        }
        
        function handleMessage(event) {
            if (event.data.type === 'applaa-game-data-loaded') {
                const data = event.data.data;
                if (data) {
                    highScore = data.highScore || 0;
                    lastPlayerName = data.lastPlayerName || '';
                    scores = data.scores || [];
                    updateHighScoreDisplays();
                    updateLeaderboard();
                    if (lastPlayerName) {
                        playerNameInput.value = lastPlayerName;
                    }
                }
            }
        }
        
        function loadGameData() {
            // Initialize displays to 0
            highScoreDisplay.textContent = 'High Score: 0.0s';
            highScoreDisplay.style.display = 'block';
            
            // Request data from parent
            try {
                window.parent.postMessage({
                    type: 'applaa-game-load-data',
                    gameId: gameId
                }, '*');
            } catch (e) {
                console.log('Running standalone, using localStorage');
                // Fallback to localStorage
                const saved = localStorage.getItem('ballBalanceData');
                if (saved) {
                    const data = JSON.parse(saved);
                    highScore = data.highScore || 0;
                    lastPlayerName = data.lastPlayerName || '';
                    scores = data.scores || [];
                    updateHighScoreDisplays();
                    updateLeaderboard();
                    if (lastPlayerName) {
                        playerNameInput.value = lastPlayerName;
                    }
                }
            }
        }
        
        function saveScore(playerName, newScore) {
            // Update local state
            if (newScore > highScore) {
                highScore = newScore;
            }
            lastPlayerName = playerName;
            
            // Add to scores array
            scores.push({
                playerName: playerName,
                score: newScore,
                timestamp: new Date().toISOString()
            });
            
            // Sort by score descending
            scores.sort((a, b) => b.score - a.score);
            
            // Keep top 10
            scores = scores.slice(0, 10);
            
            // Try to save to parent
            try {
                window.parent.postMessage({
                    type: 'applaa-game-save-score',
                    gameId: gameId,
                    playerName: playerName,
                    score: newScore
                }, '*');
            } catch (e) {
                console.log('Saving to localStorage');
            }
            
            // Also save to localStorage as backup
            localStorage.setItem('ballBalanceData', JSON.stringify({
                highScore: highScore,
                lastPlayerName: lastPlayerName,
                scores: scores
            }));
            
            updateHighScoreDisplays();
            updateLeaderboard();
        }
        
        function updateHighScoreDisplays() {
            const hsText = `High Score: ${highScore.toFixed(1)}s`;
            highScoreDisplay.textContent = hsText;
            gameOverHighScore.textContent = hsText;
            hudHighScore.textContent = `Best: ${highScore.toFixed(1)}s`;
        }
        
        function updateLeaderboard() {
            if (scores.length === 0) {
                leaderboardEl.innerHTML = '';
                return;
            }
            
            let html = '<h3>🏆 Top Scores</h3>';
            const topScores = scores.slice(0, 5);
            topScores.forEach((s, i) => {
                html += `<div class="leaderboard-entry">
                    <span>${i + 1}. ${s.playerName}</span>
                    <span>${s.score.toFixed(1)}s</span>
                </div>`;
            });
            leaderboardEl.innerHTML = html;
        }
        
        function startGame() {
            const name = playerNameInput.value.trim() || 'Player';
            lastPlayerName = name;
            
            resetGame();
            
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            hud.classList.remove('hidden');
            
            gameState = 'playing';
            lastTime = performance.now();
            gameLoop(lastTime);
        }
        
        function restartGame() {
            resetGame();
            
            gameOverScreen.classList.add('hidden');
            hud.classList.remove('hidden');
            
            gameState = 'playing';
            lastTime = performance.now();
            gameLoop(lastTime);
        }
        
        function showMenu() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            
            gameState = 'start';
            startScreen.classList.remove('hidden');
            gameOverScreen.classList.add('hidden');
            hud.classList.add('hidden');
            
            resetGame();
            draw();
        }
        
        function closeGame() {
            try {
                window.parent.postMessage({ type: 'close-game' }, '*');
            } catch (e) {
                window.close();
            }
        }
        
        function resetGame() {
            score = 0;
            
            ball.x = CANVAS_WIDTH / 2;
            ball.y = 350;
            ball.vx = 0;
            ball.vy = 0;
            ball.rotation = 0;
            
            platform.angle = 0;
            platform.targetAngle = 0;
            
            keys.left = false;
            keys.right = false;
            
            timeDisplay.textContent = 'Time: 0.0s';
        }
        
        function gameOver() {
            gameState = 'gameover';
            
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            
            hud.classList.add('hidden');
            
            // Check for new high score
            const isNewHighScore = score > highScore;
            
            // Save the score
            saveScore(lastPlayerName, score);
            
            // Update game over screen
            finalScoreEl.textContent = `Time Survived: ${score.toFixed(1)}s`;
            gameOverHighScore.textContent = `High Score: ${highScore.toFixed(1)}s`;
            
            if (isNewHighScore && score > 0) {
                newHighScoreEl.classList.remove('hidden');
            } else {
                newHighScoreEl.classList.add('hidden');
            }
            
            gameOverScreen.classList.remove('hidden');
        }
        
        function gameLoop(currentTime) {
            if (gameState !== 'playing') return;
            
            const deltaTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;
            
            update(deltaTime);
            draw();
            
            animationId = requestAnimationFrame(gameLoop);
        }
        
        function update(dt) {
            // Clamp delta time to prevent physics issues
            dt = Math.min(dt, 0.05);
            
            // Update score
            score += dt;
            timeDisplay.textContent = `Time: ${score.toFixed(1)}s`;
            
            // Update high score display if beaten
            if (score > highScore) {
                hudHighScore.textContent = `Best: ${score.toFixed(1)}s`;
            }
            
            // Handle platform tilt input
            if (keys.left) {
                platform.targetAngle = -MAX_TILT_ANGLE;
            } else if (keys.right) {
                platform.targetAngle = MAX_TILT_ANGLE;
            } else {
                platform.targetAngle = 0;
            }
            
            // Smoothly move platform angle toward target
            const angleDiff = platform.targetAngle - platform.angle;
            platform.angle += angleDiff * TILT_SPEED * dt * 3;
            
            // Apply gravity to ball
            ball.vy += GRAVITY * dt;
            
            // Apply platform tilt effect (gravity component along platform)
            const gravityAlongPlatform = GRAVITY * Math.sin(platform.angle);
            ball.vx += gravityAlongPlatform * dt;
            
            // Apply friction
            ball.vx *= FRICTION;
            
            // Update ball position
            ball.x += ball.vx * dt;
            ball.y += ball.vy * dt;
            
            // Update ball rotation based on horizontal velocity
            ball.rotation += (ball.vx / ball.radius) * dt;
            
            // Check collision with platform
            checkPlatformCollision();
            
            // Check if ball fell off
            if (ball.y > CANVAS_HEIGHT + 50 || ball.x < -50 || ball.x > CANVAS_WIDTH + 50) {
                gameOver();
            }
        }
        
        function checkPlatformCollision() {
            // Get platform corners in world space
            const cos = Math.cos(platform.angle);
            const sin = Math.sin(platform.angle);
            
            // Transform ball position to platform local space
            const localX = (ball.x - platform.x) * cos + (ball.y - platform.y) * sin;
            const localY = -(ball.x - platform.x) * sin + (ball.y - platform.y) * cos;
            
            // Check if ball is within platform bounds horizontally
            const halfWidth = platform.width / 2;
            const halfHeight = platform.height / 2;
            
            if (localX >= -halfWidth && localX <= halfWidth) {
                // Check vertical collision
                const topOfPlatform = -halfHeight;
                
                if (localY + ball.radius > topOfPlatform && localY < topOfPlatform + ball.radius + 10) {
                    // Collision! Place ball on top of platform
                    const newLocalY = topOfPlatform - ball.radius;
                    
                    // Transform back to world space
                    ball.x = platform.x + localX * cos - newLocalY * sin;
                    ball.y = platform.y + localX * sin + newLocalY * cos;
                    
                    // Calculate velocity in local space
                    const localVx = ball.vx * cos + ball.vy * sin;
                    let localVy = -ball.vx * sin + ball.vy * cos;
                    
                    // Bounce or stop vertical velocity
                    if (localVy > 0) {
                        localVy = -localVy * BOUNCE;
                        if (Math.abs(localVy) < 20) {
                            localVy = 0;
                        }
                    }
                    
                    // Transform velocity back to world space
                    ball.vx = localVx * cos - localVy * sin;
                    ball.vy = localVx * sin + localVy * cos;
                }
            }
        }
        
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0f2847';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            // Draw background gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
            gradient.addColorStop(0, '#1e3a5f');
            gradient.addColorStop(1, '#0f2847');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            // Draw some decorative elements
            ctx.fillStyle = 'rgba(255, 255, 255, 0.02)';
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.arc(
                    100 + i * 150, 
                    500 + Math.sin(Date.now() / 1000 + i) * 20,
                    50 + i * 10,
                    0, Math.PI * 2
                );
                ctx.fill();
            }
            
            // Draw platform
            drawPlatform();
            
            // Draw ball
            drawBall();
        }
        
        function drawPlatform() {
            ctx.save();
            ctx.translate(platform.x, platform.y);
            ctx.rotate(platform.angle);
            
            // Platform shadow
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(-platform.width/2 + 5, -platform.height/2 + 5, platform.width, platform.height);
            
            // Main platform body
            const platGradient = ctx.createLinearGradient(0, -platform.height/2, 0, platform.height/2);
            platGradient.addColorStop(0, '#6aa3e8');
            platGradient.addColorStop(0.5, '#4a90d9');
            platGradient.addColorStop(1, '#357abd');
            ctx.fillStyle = platGradient;
            ctx.fillRect(-platform.width/2, -platform.height/2, platform.width, platform.height);
            
            // Platform highlight
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(-platform.width/2, -platform.height/2, platform.width, platform.height/3);
            
            // Platform edges
            ctx.fillStyle = '#2d5a8a';
            ctx.fillRect(-platform.width/2 - 5, -platform.height/2 - 5, 10, platform.height + 10);
            ctx.fillRect(platform.width/2 - 5, -platform.height/2 - 5, 10, platform.height + 10);
            
            // Edge highlights
            ctx.fillStyle = '#4a7ab8';
            ctx.fillRect(-platform.width/2 - 5, -platform.height/2 - 5, 10, (platform.height + 10) / 2);
            ctx.fillRect(platform.width/2 - 5, -platform.height/2 - 5, 10, (platform.height + 10) / 2);
            
            ctx.restore();
        }
        
        function drawBall() {
            ctx.save();
            ctx.translate(ball.x, ball.y);
            ctx.rotate(ball.rotation);
            
            // Ball shadow
            ctx.beginPath();
            ctx.arc(3, 3, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fill();
            
            // Ball body gradient
            const ballGradient = ctx.createRadialGradient(
                -ball.radius * 0.3, -ball.radius * 0.3, 0,
                0, 0, ball.radius
            );
            ballGradient.addColorStop(0, '#ff8a7a');
            ballGradient.addColorStop(0.7, '#ff6b5b');
            ballGradient.addColorStop(1, '#cc4444');
            
            ctx.beginPath();
            ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = ballGradient;
            ctx.fill();
            
            // Ball highlight
            ctx.beginPath();
            ctx.arc(-ball.radius * 0.3, -ball.radius * 0.3, ball.radius * 0.3, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.fill();
            
            // Ball pattern (stripe to show rotation)
            ctx.beginPath();
            ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Rotation indicator stripe
            ctx.beginPath();
            ctx.moveTo(-ball.radius * 0.7, 0);
            ctx.lineTo(ball.radius * 0.7, 0);
            ctx.strokeStyle = 'rgba(200, 50, 50, 0.5)';
            ctx.lineWidth = 4;
            ctx.stroke();
            
            ctx.restore();
        }
        
        // Start the game
        init();
    </script>
</body>
